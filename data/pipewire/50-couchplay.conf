#
# PipeWire PulseAudio TCP listener for cross-user audio routing.
# Installed to ~/.config/pipewire/pipewire-pulse.conf.d/ by CouchPlay helper.
# This allows gaming users to route audio through the compositor's PipeWire.

pulse.properties = {
    server.address = [
        "unix:native"
        "tcp:127.0.0.1:4713"
    ]
}
